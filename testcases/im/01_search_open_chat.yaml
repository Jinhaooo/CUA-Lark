id: im_01_search_open_chat
title: Prompt-driven search target chat and open it
tags: [im, smoke, prompt_planning, m3c]
timeoutSeconds: 180
instruction: "Open the Lark IM group ${config:im.test_group.name_pattern}."
expectations:
  - The planner generates skill calls from the instruction.
  - The message area switches to the target chat.
teardown_skills:
  - skill: _common.cleanup_im_messages
    params:
      chatPattern: "${config:im.test_group.name_pattern}"
      contentPattern: "CUA-Test-"
